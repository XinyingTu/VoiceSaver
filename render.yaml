# Render Blueprint — one Docker web service serving the FastAPI backend and the
# built frontend from a single public URL. Deploy: Render Dashboard →
# "New +" → "Blueprint" → pick the VoiceSaver repo → Apply.
services:
  - type: web
    name: voicesaver
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Optional integrations — set real values in the Render dashboard to enable
      # live document vision / voice / market paths. Left unset, the app runs the
      # clearly-labeled simulated market and never fabricates quotes.
      - key: OPENAI_API_KEY
        sync: false
      - key: VISION_MODEL
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      # Public-by-design: this id is sent to every browser and used client-side
      # to open the live voice session, so it is safe to commit. The agent itself
      # is public (enable_auth=false) and its 4 tools point at this service's
      # /api/tools/* webhooks. Rotate/delete the agent after judging if desired.
      - key: ELEVENLABS_AGENT_ID
        value: agent_8301kxvzcnchf5ar83csbmy0nynv
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: YELP_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
